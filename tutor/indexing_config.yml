# Tutor content indexing configuration

course:
  name: "BANA 7025"
  title: "Data Wrangling with Python"
  institution: "University of Cincinnati"

index:
  output_file: "tutor/content_index.json"

  chunk_settings:
    max_chunk_tokens: 512
    overlap_tokens: 64
    min_chunk_tokens: 50

  metadata_template:
    course: "BANA 7025"
    module: null        # populated per file
    week: null          # populated per file
    topic: null         # populated per file
    source_type: null   # textbook | slides | example | lab | project
    path: null          # file path
    student_visible: null
    graded: null
    content: null       # chunked text

  extraction:
    qmd:
      strip_yaml: true
      include_code: true
      include_callouts: true

    ipynb:
      include_markdown: true
      include_code: true
      skip_output: true   # don't index cell outputs

# Module/week metadata for tagging during indexing
modules:
  - module: 1
    week: 1
    topics: ["introduction", "data science", "python setup", "python basics", "data types", "variables"]
    chapters: ["01-intro-data-mining", "02-preparing-for-code", "03-python-basics"]

  - module: 2
    week: 2
    topics: ["jupyter", "notebooks", "data structures", "lists", "dicts", "libraries", "packages", "import"]
    chapters: ["04-jupyter", "05-data-structures", "06-libraries"]

  - module: 3
    week: 3
    topics: ["importing data", "read_csv", "dataframes", "pandas", "subsetting", "filtering", "selecting columns"]
    chapters: ["07-importing-data", "08-dataframes", "09-subsetting"]

  - module: 4
    week: 4
    topics: ["manipulating data", "transforming columns", "aggregation", "groupby", "joining", "merge"]
    chapters: ["10-manipulating-data", "11_aggregating_data", "12-joining-data"]

  - module: 5
    week: 5
    topics: ["visualization", "plotting", "pandas plot", "matplotlib", "seaborn", "bokeh", "interactive"]
    chapters: ["13-data-viz-pandas", "14-data-viz-matplotlib", "15-data-viz-bokeh"]

  - module: 6
    week: 6
    topics: ["control flow", "if else", "iteration", "for loops", "while loops", "functions", "reusable code"]
    chapters: ["16-control-statements", "17-iteration-statements", "18-functions"]

  - module: 7
    week: 7
    topics: ["EDA", "data exploration", "modeling", "scikit-learn", "feature engineering", "model evaluation"]
    chapters: ["19-data-exploration", "20-first-model", "21-feature-engineering", "22-model-evaluation"]
